<!DOCTYPE html>
<!-- Deal Insight Pipeline Tracker (Demo) -->
<html lang="en" class=""><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Tracker · Deal Insight</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap');

  /* ── Design Tokens ─────────────────────────────────────────── */
  :root{
    --navy:#1B1F3B; --navy-mid:#252a4a;
    --green:#1D9E75; --green-dark:#178a65;
    --bg:#f4f6f8; --surface:#ffffff;
    --border:#e2e6ea; --border-mid:#d0d5dd;
    --muted:#f8f9fa;
    --text-primary:#111928; --text-secondary:#374151;
    --text-muted:#6b7280; --text-xmuted:#9ca3af;
    --hist-color:#7F77DD; --ai-color:#7F77DD;
    --focus-ring:0 0 0 3px rgba(29,158,117,.25);
    --text-xs:12px; --text-sm:13px; --text-base:14px;
    --text-md:15px; --text-lg:17px; --text-xl:21px;
    --sp-1:4px; --sp-2:8px; --sp-3:12px;
    --sp-4:16px; --sp-5:20px; --sp-6:24px;
    --r-sm:6px; --r-md:8px; --r-lg:10px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow:visible;height:auto}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;font-size:var(--text-base);color:var(--text-primary);-webkit-font-smoothing:antialiased;width:960px;margin:0 auto}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:var(--r-sm)}

  /* Header */
  #rainbow-bar{height:6px;background:linear-gradient(90deg, #D4537E 0%, #EF9F27 33%, #7F77DD 66%, #1D9E75 100%);position:relative;z-index:1;box-shadow:0 3px 6px rgba(0,0,0,0.1)}
  #sticky-wrap{position:fixed;top:0;left:0;right:0;z-index:100;width:960px;margin:0 auto;padding:8px 16px 0;background:var(--bg)}
  #header{background:#1B1F3B;padding:0;border-radius:var(--r-lg);overflow:visible;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
  #header-top-bar{background:#252a4a;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--r-lg) var(--r-lg) 0 0}
  #month-summary{padding:18px 32px 22px}
  #header-top{display:none}
  #header-week{display:none}
  #quota-bar-wrap{display:none}

  /* Alerts */
  .alert-wrap { position: relative; display: flex; justify-content: center; }
  .alert-dd {
    display: none; position: absolute; top: calc(100% + 8px);
    left: 50%; transform: translateX(-50%);
    width: 280px; border-radius: 10px; z-index: 100; overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .alert-dd.open { display: block; }
  .alert-dd-dark { background: #1e2444; border: 1px solid #3d4470; }
  .alert-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; cursor: pointer;
  }
  .alert-item-dark { border-bottom: 1px solid #2e3358; }
  .alert-item-dark:hover { background: rgba(255,255,255,0.04); }
  .alert-item-dark:last-child { border-bottom: none; }
  .alert-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .alert-text { flex: 1; }
  .alert-title { font-size: 12px; font-weight: 700; margin-bottom: 2px; color: #e0e0f0; }
  .alert-sub { font-size: 11px; line-height: 1.4; color: #9999BB; }

  /* Toolbar */
  #toolbar{display:flex;justify-content:space-between;align-items:center;margin:var(--sp-4) 0 var(--sp-3);flex-wrap:wrap;gap:var(--sp-2)}
  #save-status{font-size:var(--text-sm);font-weight:600;color:var(--text-secondary)}
  #acct-count{font-size:var(--text-sm);color:var(--text-muted)}

  /* Cards */
  .card{border-radius:var(--r-lg);border:1px solid var(--border);margin-bottom:var(--sp-2);background:var(--surface);box-shadow:0 1px 2px rgba(0,0,0,.05);transition:box-shadow .15s,border-color .15s;scroll-margin-top:80px}
  .card.open{overflow:visible}
  .card:hover{border-color:var(--border-mid)}
  .card.open{box-shadow:0 4px 16px rgba(0,0,0,.09);border-color:var(--border-mid)}
  .card-header{display:flex;align-items:center;padding:13px var(--sp-4);cursor:pointer;gap:10px;border-bottom:0;min-height:52px;transition:background .12s}
  .card.open .card-header{border-bottom:1px solid var(--border);position:sticky;top:100px;z-index:50;background:var(--card-bg,var(--surface));border-radius:var(--r-lg) var(--r-lg) 0 0}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .card-name{font-weight:700;font-size:var(--text-md);color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em;line-height:1.3}
  .card-sub{font-size:var(--text-sm);color:var(--text-muted);margin-top:2px;display:flex;gap:var(--sp-2);flex-wrap:wrap;line-height:1.4}
  .card-meta{display:flex;gap:var(--sp-1);align-items:center;flex-shrink:0}
  .tag{font-size:var(--text-xs);font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.02em;line-height:1.4}
  .arr-tag{font-size:var(--text-sm);font-weight:700;color:#085041;background:#d1fae5;padding:3px 10px;border-radius:20px}
  .chevron{color:var(--text-xmuted);font-size:var(--text-sm);transition:transform .2s}

  /* Card body */
  .card-body{padding:var(--sp-5);display:none}
  .card.open .card-body{display:block}

  /* Form elements */
  .field-label{font-size:var(--text-xs);font-weight:700;color:var(--text-secondary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:var(--sp-1);display:block;line-height:1.4}
  input,select,textarea{width:100%;padding:8px 10px;border-radius:var(--r-sm);border:1px solid var(--border-mid);font-size:var(--text-base);color:var(--text-primary);font-family:inherit;outline:none;background:var(--surface);line-height:1.4;transition:border-color .12s,box-shadow .12s;box-sizing:border-box}
  .deal-grid select,.deal-grid input{height:38px}
  input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:var(--focus-ring)}
  input:hover:not(:focus),select:hover:not(:focus),textarea:hover:not(:focus){border-color:#9ca3af}
  textarea{resize:vertical;line-height:1.6}
  select{cursor:pointer}
  select.sel-dashed{border:1.5px dashed #9ca3af}
  input::placeholder,textarea::placeholder{color:var(--text-xmuted)}

  /* Checkboxes */
  .cb-wrap{display:flex;align-items:center;gap:var(--sp-1);cursor:pointer;user-select:none;min-height:28px}
  .cb-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border-mid);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .cb-box.checked{border-color:var(--green-dark);background:var(--green-dark)}
  .cb-box.checked.cb-amber{border-color:#EF9F27;background:#EF9F27}
  .cb-box.checked.cb-purple{border-color:#7F77DD;background:#7F77DD}
  .cb-label{font-size:var(--text-sm);color:var(--text-secondary);font-weight:500;white-space:nowrap}
  .cb-label.checked{color:#085041;font-weight:700}
  .cb-label.checked.cbl-amber{color:#92400e}

  /* Section dividers */
  .section-div{border-top:1px solid var(--border);margin:var(--sp-4) 0;display:flex;align-items:center;gap:var(--sp-2)}
  .section-div span{font-size:var(--text-xs);font-weight:700;color:var(--text-xmuted);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;padding-top:var(--sp-3)}

  /* Call date select */
  .cl-date-sel{width:auto;min-width:64px;max-width:76px;padding:4px 5px;font-size:var(--text-xs);border-radius:var(--r-sm);border:1px solid var(--border);background:var(--muted);color:var(--text-secondary);cursor:pointer;flex-shrink:0}

  /* Product picker */
  .prod-trigger{min-width:130px;padding:4px 8px;border:1px solid var(--border-mid);border-radius:var(--r-sm);background:var(--surface);font-size:13px;color:var(--text-secondary);cursor:pointer;white-space:normal;line-height:1.5}
  .prod-trigger:hover{border-color:#9ca3af;background:var(--muted)}
  .prod-menu{position:absolute;top:calc(100% + 4px);left:0;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:0 8px 24px rgba(0,0,0,.12);padding:4px 0;min-width:200px}
  .prod-opt{padding:7px 14px;font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;white-space:nowrap}
  .prod-opt:hover{background:var(--muted)}
  .prod-opt.selected{color:#085041;font-weight:700;background:#ecfdf5}

  /* Delete button */
  .del-btn{font-size:var(--text-xs);color:#dc2626;background:none;border:1px solid #fca5a5;border-radius:var(--r-sm);padding:5px 12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .12s}
  .del-btn:hover{background:#fef2f2;border-color:#f87171}

  /* Add account */
  #add-wrap{display:flex;gap:var(--sp-2);margin-top:var(--sp-3);background:var(--surface);border-radius:var(--r-lg);border:1.5px dashed var(--border-mid);padding:10px var(--sp-4)}
  #add-input{flex:1;border:none;outline:none;font-size:var(--text-md);color:var(--text-secondary);font-family:inherit;background:transparent}
  #add-input::placeholder{color:var(--text-xmuted)}
  #add-btn{background:#2C2C2A;color:#fff;border:none;border-radius:var(--r-sm);padding:7px var(--sp-4);font-size:var(--text-sm);font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:background .12s}
  #add-btn:hover{background:var(--navy-mid)}

  /* Footer */
  #footer{margin-top:var(--sp-4);font-size:var(--text-sm);color:var(--text-xmuted);text-align:center}

  /* Search */
  #search-input{font-family:inherit;transition:border-color .12s,box-shadow .12s}
  #search-input:focus{border-color:#AFA9EC!important;box-shadow:0 0 0 3px rgba(175,169,236,.25)}
  #search-clear.visible{display:flex}
  #search-count{font-size:var(--text-xs);color:#9999BB;margin-top:4px;min-height:16px}

  /* Main */
  #main{width:960px;margin:0 auto;padding:var(--sp-5) var(--sp-4) 60px}


  /* Tabs */
  .bottom-tab-container{border-top:2px solid var(--border);margin-top:var(--sp-3)}
  .bottom-tab-bar{display:flex;gap:0;align-items:flex-end;padding-top:var(--sp-2)}
  .bottom-tab{padding:6px 13px;font-size:var(--text-xs);font-weight:700;letter-spacing:.06em;cursor:pointer;border:1.5px solid var(--border);border-bottom:none;border-radius:var(--r-sm) var(--r-sm) 0 0;background:var(--muted);color:var(--text-xmuted);user-select:none;transition:all .12s;margin-right:3px;position:relative;top:1px;text-transform:uppercase;min-height:30px;display:flex;align-items:center}
  .bottom-tab:hover{color:var(--text-secondary);background:#eaedf0}
  .bottom-tab.active{background:var(--surface);border-color:var(--border-mid);border-bottom:1.5px solid var(--surface);z-index:1;color:var(--text-primary)}
  .bottom-tab.active[data-tab="history"]{border-top:2.5px solid var(--hist-color)}
  .bottom-tab.active[data-tab="ai"]{border-top:2.5px solid var(--ai-color)}
  .bottom-tab-panel{display:none;border:1.5px solid var(--border-mid);border-radius:0 var(--r-sm) var(--r-sm) var(--r-sm);background:var(--surface);padding:2px 0 0}
  .bottom-tab-panel.active{display:block}
  .bottom-tab-panel[data-theme="history"]{background:var(--surface);border-color:var(--border-mid)}
  .bottom-tab-panel[data-theme="ai"]{background:var(--surface);border-color:var(--border-mid)}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

  /* AI tab */
  .ai-section{padding:var(--sp-3);font-family:inherit}
  .ai-btn{display:inline-flex;align-items:center;padding:7px 14px;border-radius:var(--r-sm);border:none;font-size:var(--text-xs);font-weight:700;cursor:pointer;margin:3px 3px 3px 0;letter-spacing:.04em;transition:all .12s;font-family:inherit}
  .ai-btn-primary{background:var(--ai-color);color:#fff}.ai-btn-primary:hover{background:#534AB7}
  .ai-btn-secondary{background:var(--muted);color:#534AB7;border:1px solid var(--border-mid)}.ai-btn-secondary:hover{background:#e5e7eb}
  .ai-output{margin-top:var(--sp-3);background:var(--muted);border:1.5px solid var(--border-mid);border-radius:var(--r-md);padding:var(--sp-4);font-size:var(--text-base);line-height:1.7;color:var(--text-primary);white-space:pre-wrap;min-height:60px;display:none}
  .ai-output.visible{display:block}
  .ai-output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-2)}
  .ai-output-title{font-size:var(--text-xs);font-weight:800;letter-spacing:.08em;color:var(--ai-color);text-transform:uppercase}
  .ai-copy-btn{font-size:var(--text-xs);font-weight:700;color:#7F77DD;background:none;border:1px solid var(--border-mid);border-radius:var(--r-sm);padding:3px 10px;cursor:pointer;transition:background .12s}
  .ai-copy-btn:hover{background:#f3f4f6}
  .ai-spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border-mid);border-top-color:var(--ai-color);border-radius:50%;animation:spin .7s linear infinite;margin-left:7px;vertical-align:middle}
  .ai-key-row{display:flex;gap:var(--sp-2);align-items:center;margin-bottom:var(--sp-3);padding:var(--sp-2) 10px;background:var(--muted);border:1px solid var(--border-mid);border-radius:var(--r-sm)}
  .ai-key-input{flex:1;font-size:var(--text-sm);border:1px solid var(--border-mid);border-radius:var(--r-sm);padding:5px var(--sp-2);font-family:monospace;background:#fff}
  .ai-key-save{font-size:var(--text-sm);font-weight:700;background:var(--ai-color);color:#fff;border:none;border-radius:var(--r-sm);padding:5px 12px;cursor:pointer}
  .ai-transcript{width:100%;font-size:var(--text-sm);border:1.5px solid var(--border-mid);border-radius:var(--r-sm);padding:var(--sp-2);font-family:inherit;resize:vertical;margin-top:var(--sp-2);min-height:80px}

  /* Boot lock — removed by JS immediately, prevents pre-rendered card flash */
  html.booting .card-body{display:none!important}
  html.booting .card{overflow:hidden}
</style>
<script>document.documentElement.classList.add('booting');</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── Excel export (XLSX via SheetJS) ─────────────────────────────────
function exportXLSX(){
  const headers = [
    "","Stage","Account Name","Notes","Close Month","ARR ($)",
    "Forecast Bucket","ERP","Source","Competitors",
    "CAM","Presales","BD","Contacts",
    "Last Step","Next Step","What Needs to Happen","What Could Get in the Way",
    "SIGNALS ✓","Pricing Sent ✓","1st Call Date","2nd Call Date",
    "HubSpot Deal #","CAM Rewards Eligible"
  ];

  const rows = state.ids
    .filter(id => state.deals[id])
    .map(id => {
      const d = state.deals[id];
      const cl = d.checklist||{};
      const cd = d.cldate||{};
      return [
        "●",
        d.stage||'', d.name||'', d.notes||'', d.targetClose||'', d.arr||'',
        (d.stage==="Open" ? (d.bucket||'') : ''), cleanVal(d.erp), cleanVal(d.source), d.competitors||'',
        cleanVal(d.cam), cleanVal(d.presales), cleanVal(d.bd), d.contacts||'',
        d.lastStep||'', d.nextStep||'', d.criticalPath||'', d.risks||'',
        cl.signals?'YES':'', d.pricingSent?'YES':'',
        cd.call1||'', cd.call2||'',
        d.hubspot||'', d.camRewards||''
      ];
    });

  // Section label row, header row, helper row, then data
  const sectionRow = ["","","CORE","","","","DEAL","","","","TEAM","","","","ACTIVITY","","","","CHECKLIST","","","","","","AFTER CLOSE",""];
  const helperRow  = ["","Won/Open/Booked/Reschedule/Hot/Closed Lost/Passive/Nurture","Unique name","Free text notes","e.g. MARCH","Numbers only","Open only","Salesforce/HubSpot/Other","Inbound/Outbound/Referral/Event/Other","","","","","","Date + what happened","Date + what's next","","","YES or blank","YES or blank","YES or blank","YES or blank","e.g. 2/15/26","e.g. 3/4/26","",""];

  const wb = XLSX.utils.book_new();
  const wsData = [sectionRow, headers, helperRow, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [3,14,28,35,14,14,16,10,12,18,22,16,16,30,35,35,35,35,10,10,10,12,14,14,18,22]
    .map(w => ({wch: w}));

  // Row color coding by stage
  // Rows 0=sectionRow, 1=headers, 2=helperRow, data starts at row 3
  // dot color per stage, row bg for Won and Closed Lost only
  const dotColors = {
    "Won":         "1D9E75",  // teal
    "Open":    "7B72D3",  // purple
    "Booked":    "EF9F27",  // amber
    "Reschedule":  "D8547C",  // pink
    "Hot":         "F2BACC",  // soft pink
    "Closed Lost": "92CFB2",  // soft teal
    "Passive":     "F4D19C",  // soft amber
    "Nurture":     "BDB8E9",  // soft purple
  };
  const rowBg = {
    "Won":         "E1F5EE",  // teal light
    "Closed Lost": "f4fdf8",  // soft teal
  };
  const numCols = headers.length;
  rows.forEach((row, ri) => {
    const stage = row[1]; // Stage is col index 1 (col B)
    const excelRow = ri + 3;
    const dotColor = dotColors[stage];
    const bg = rowBg[stage];
    // Color the dot cell (col 0)
    const dotRef = XLSX.utils.encode_cell({r: excelRow, c: 0});
    if(!ws[dotRef]) ws[dotRef] = {t:'s', v:'●'};
    ws[dotRef].s = {
      font: { color: { rgb: dotColor||"9CA3AF" }, sz: 14 },
      alignment: { horizontal: "center", vertical: "center" }
    };
    // Apply Inter 12pt + wrap text to all data cells; bg for Won/Closed Lost
    for(let ci = 0; ci < numCols; ci++){
      const cellRef = XLSX.utils.encode_cell({r: excelRow, c: ci});
      if(!ws[cellRef]) ws[cellRef] = {t:'s', v:''};
      const existingS = ws[cellRef].s || {};
      ws[cellRef].s = {
        ...existingS,
        font: { ...(existingS.font||{}), name: "Inter", sz: 12 },
        alignment: { wrapText: true, vertical: "top", ...(existingS.alignment||{}) },
        fill: bg && ci > 0
          ? { patternType: "solid", fgColor: { rgb: bg } }
          : (existingS.fill || undefined)
      };
    }
  });

  // Set fixed row height for all data rows (single line height = 18pt)
  if(!ws['!rows']) ws['!rows'] = [];
  // Header rows
  ws['!rows'][0] = { hpt: 18 };
  ws['!rows'][1] = { hpt: 18 };
  ws['!rows'][2] = { hpt: 15 };
  // Data rows
  for(let ri = 0; ri < rows.length; ri++){
    ws['!rows'][ri + 3] = { hpt: 18 };
  }

  // Add dropdown validation for key columns
  // SheetJS community doesn't support data validation natively, but we add a Dropdowns sheet for reference
  // Build Dropdowns sheet with full CAM list
  const camList = CAM_LIST;
  const maxRows = Math.max(8, camList.length);
  const stages  = ["Won","Open","Hot","Nurture","Reschedule","Closed Lost",""];
  const forecasts = ["Commit","Upside","","","","","",""];
  const erps    = ["P21","BisTrack","Eclipse","Prelude","","","",""];
  const sources = ["Inbound","Outbound","Referral","Event","Other","","",""];
  const bds     = ["Connor","Taylor","NA","","","","",""];
  const dropWsData = [["Stage","Forecast","ERP","Source","BD","CAM"]];
  for(let i=0;i<maxRows;i++){
    dropWsData.push([
      stages[i]||"", forecasts[i]||"", erps[i]||"", sources[i]||"", bds[i]||"", camList[i]||""
    ]);
  }
  const dropWs = XLSX.utils.aoa_to_sheet(dropWsData);
  dropWs['!cols'] = [14,12,10,12,10,28].map(w=>({wch:w}));

  // Freeze first 2 columns (dot + account name)
  // Freeze cols A+B+C and rows 1-3 (section/header/helper)
  ws['!freeze'] = {xSplit:3, ySplit:3, topLeftCell:"D4", activeCell:"D4", state:"frozen"};
  // Pipeline first, Dropdowns second
  XLSX.utils.book_append_sheet(wb, ws, "Pipeline");
  XLSX.utils.book_append_sheet(wb, dropWs, "Dropdowns");

  const date = new Date();
  const stamp = (date.getMonth()+1)+'_'+date.getDate()+'_'+String(date.getFullYear()).slice(2);
  XLSX.writeFile(wb, `DealInsight_Pipeline_${stamp}.xlsx`);

  const status = document.getElementById('excel-status');
  status.textContent = `✓ Exported ${rows.length} deals`;
  setTimeout(()=>status.textContent='', 4000);
}

// Column name aliases — case-insensitive, any order in Excel
const COL_ALIASES = {
  name:        ['account name','account','company','company name','name'],
  stage:       ['stage','deal stage','status'],
  closeMonth:  ['close month','close date','target close','closing month','month'],
  arr:         ['arr','arr ($)','arr($)','annual recurring revenue','revenue','deal value','amount'],
  bucket:      ['forecast bucket','forecast','bucket'],
  erp:         ['erp','erp system','crm version'],
  source:      ['source','lead source'],
  competitors: ['competitors','competition','competitive'],
  cam:         ['cam','channel account manager','partner manager'],
  presales:    ['presales','pre-sales','solutions engineer','se'],
  bd:          ['bd','business development'],
  contacts:    ['contacts','contact','key contacts'],
  lastStep:    ['last step','last activity','last action','what happened'],
  nextStep:    ['next step','next action','next','action item'],
  criticalPath:['what needs to happen','critical path','needs to happen'],
  risks:       ['what could get in the way','risks','risk','blockers'],
  notes:       ['notes','note','comments'],
  cl_signals:  ['signals','signals ✓','signals done'],
  pricingSent: ['pricing sent','pricing sent ✓','pricing'],
  cldate_call1:['1st call date','first call','call 1 date','1st call'],
  cldate_call2:['2nd call date','second call','call 2 date','2nd call'],
  hubspot:     ['hubspot deal #','hubspot','hubspot id','deal id','hs deal'],
  camRewards:  ['cam rewards eligible','cam rewards','rewards eligible'],
};

function buildColMap(headerRow){
  const map = {};
  headerRow.forEach((h, i) => {
    const norm = (h||'').toString().toLowerCase().trim();
    for(const [field, aliases] of Object.entries(COL_ALIASES)){
      if(aliases.includes(norm) && !(field in map)) map[field] = i;
    }
  });
  return map;
}

function loadExcel(input){
  const file = input.files[0];
  if(!file) return;
  const status = document.getElementById('excel-status');
  status.textContent = 'Reading...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      // Auto-detect header row (first row containing "account name" / "account" / "company")
      let headerIdx = -1;
      for(let i=0; i<Math.min(rows.length,6); i++){
        const norm = rows[i].map(c=>(c||'').toString().toLowerCase().trim());
        if(norm.some(c=>['account name','account','company','name'].includes(c))){
          headerIdx = i; break;
        }
      }
      if(headerIdx === -1){
        status.textContent = '⚠ No header row found - needs an Account Name column';
        return;
      }

      const colMap = buildColMap(rows[headerIdx]);
      if(!('name' in colMap)){
        status.textContent = '⚠ Could not find Account Name column';
        return;
      }

      const str    = v => (v||'').toString().trim();
      const yn     = v => str(v).toUpperCase()==='YES';
      const get    = (r, field) => field in colMap ? r[colMap[field]] : undefined;
      const fmtDate= v => {
        if(!v) return '';
        if(v instanceof Date) return (v.getMonth()+1)+'/'+(v.getDate())+'/'+String(v.getFullYear()).slice(2);
        return str(v);
      };

      let imported=0, created=0;
      for(let i=headerIdx+1; i<rows.length; i++){
        const r    = rows[i];
        const name = str(get(r,'name'));
        if(!name) continue;

        const existingId = Object.keys(state.deals).find(id =>
          state.deals[id].name.toLowerCase() === name.toLowerCase()
        );
        const id = existingId || 'xl_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,30)+'_'+Date.now();
        const d  = existingId ? {...state.deals[existingId]} : {...EMPTY, id, name};
        const s  = field => { const v=get(r,field); return v!==undefined ? str(v) : ''; };

        d.name = name;
        if(s('stage'))       d.stage        = s('stage');
        if(s('closeMonth'))  d.targetClose  = s('closeMonth');
        if(s('arr'))         d.arr          = s('arr').replace(/[^0-9.,]/g,'');
        if(s('bucket'))      d.bucket       = s('bucket');
        if(s('erp'))         d.erp          = s('erp');
        if(s('source'))      d.source       = s('source');
        if(s('competitors')) d.competitors  = s('competitors');
        if(s('cam'))         d.cam          = s('cam');
        if(s('presales'))    d.presales     = s('presales');
        if(s('bd'))          d.bd           = s('bd');
        if(s('contacts'))    d.contacts     = s('contacts');
        if(s('lastStep'))    d.lastStep     = s('lastStep');
        if(s('nextStep'))    d.nextStep     = s('nextStep');
        if(s('criticalPath'))d.criticalPath = s('criticalPath');
        if(s('risks'))       d.risks        = s('risks');
        if(s('notes'))       d.notes        = s('notes');
        if(s('hubspot'))     d.hubspot      = s('hubspot');
        if(s('camRewards'))  d.camRewards   = s('camRewards');

        if(!d.checklist) d.checklist={};
        const mv=get(r,'cl_signals');  if(mv!==undefined && yn(mv))  d.checklist.signals=true;
        const psv=get(r,'pricingSent');if(psv!==undefined && yn(psv)) d.pricingSent=true;

        if(!d.cldate) d.cldate={};
        const c1=get(r,'cldate_call1'); if(c1) d.cldate.call1=fmtDate(c1);
        const c2=get(r,'cldate_call2'); if(c2) d.cldate.call2=fmtDate(c2);
        state.deals[id] = d;
        imported++;
      }
      saveState();
      renderAll();
      status.textContent = `✓ ${imported} deals synced${created?' ('+created+' new)':''}`;
      setTimeout(()=>status.textContent='', 5000);
      input.value='';
    } catch(err){
      status.textContent = '⚠ Error reading file';
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

</script>

const SK = "dealinsight_demo_v1";

async function idbSet(key, value){
  return new Promise((res, rej)=>{
    const req = indexedDB.open("dealinsight_demo", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("kv");
    req.onsuccess = e => {
      const tx = e.target.result.transaction("kv","readwrite");
      tx.objectStore("kv").put(value, key);
      tx.oncomplete = ()=>res();
      tx.onerror = ()=>rej(tx.error);
    };
    req.onerror = ()=>rej(req.error);
  });
}

async function idbGet(key){
  return new Promise((res, rej)=>{
    const req = indexedDB.open("dealinsight_demo", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("kv");
    req.onsuccess = e => {
      const tx = e.target.result.transaction("kv","readonly");
      const r = tx.objectStore("kv").get(key);
      r.onsuccess = ()=>res(r.result);
      r.onerror = ()=>rej(r.error);
    };
    req.onerror = ()=>rej(req.error);
  });
}

async function idbDelete(key){
  return new Promise((res, rej)=>{
    const req = indexedDB.open("dealinsight_demo", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("kv");
    req.onsuccess = e => {
      const tx = e.target.result.transaction("kv","readwrite");
      tx.objectStore("kv").delete(key);
      tx.oncomplete = ()=>res();
      tx.onerror = ()=>rej(tx.error);
    };
    req.onerror = ()=>rej(req.error);
  });
}

async function savePhoto(id, dataUrl){
  try{
    if(dataUrl && dataUrl.length > 0){
      await idbSet("photo_"+id, dataUrl);
    } else {
      await idbDelete("photo_"+id);
    }
  }catch(e){
    console.warn("Photo save failed for", id, e);
  }
}

async function loadPhotos(){
  try{
    const req = indexedDB.open("dealinsight_demo", 1);
    await new Promise((res, rej)=>{
      req.onupgradeneeded = e => e.target.result.createObjectStore("kv");
      req.onsuccess = e => {
        const tx = e.target.result.transaction("kv","readonly");
        const r = tx.objectStore("kv").getAllKeys();
        r.onsuccess = async ()=>{
          const photoKeys = r.result.filter(k=>k.startsWith("photo_"));
          for(const key of photoKeys){
            const id = key.slice(6);
            if(state.deals[id]){
              const dataUrl = await idbGet(key);
              if(dataUrl) state.deals[id].photo = dataUrl;
            }
          }
          res();
        };
        r.onerror = ()=>rej(r.error);
      };
      req.onerror = ()=>rej(req.error);
    });
  }catch(e){
    // no photos yet, fine
  }
}

let _unsavedChanges = false;
function saveState(){
  _unsavedChanges = true;
  clearTimeout(saveTimer);
  const statusEl = document.getElementById("save-status");
  if(statusEl){ statusEl.textContent="● Saving..."; statusEl.style.color="#f59e0b"; }
  saveTimer = setTimeout(async ()=>{
    // Strip photos out — save them separately in IndexedDB
    const slim = JSON.parse(JSON.stringify(state));
    const photoSaves = [];
    Object.keys(slim.deals).forEach(id=>{
      const photo = slim.deals[id].photo;
      if(photo && photo !== "__photo_stripped__"){
        photoSaves.push(savePhoto(id, photo));
      }
      delete slim.deals[id].photo;
    });
    try{
      // Save main state to IndexedDB (no size limit)
      await idbSet(SK, slim);
    }catch(e){
      if(statusEl){ statusEl.textContent="● Save failed - use Backup!"; statusEl.style.color="#ef4444"; return; }
    }
    await Promise.allSettled(photoSaves);
    _unsavedChanges = false;
    if(statusEl){
      const now = new Date();
      const t = now.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
      statusEl.textContent=`● Saved ${t}`; statusEl.style.color="#1D9E75";
    }
  }, 600);
}

function migrateState(){
  // Legacy Implementation deals removed at source
  // Deduplicate by name — if same name appears twice, keep the first occurrence
  const seenNames = {};
  state.ids = state.ids.filter(id => {
    const d = state.deals[id];
    if(!d) return false;
    const key = (d.name||"").trim().toLowerCase();
    if(!key) return true; // keep unnamed
    if(seenNames[key]){ delete state.deals[id]; return false; }
    seenNames[key] = true;
    return true;
  });

  // ── Zombie stage killer (always run, not version-gated) ──
  // Maps every dead stage name to its correct current stage.
  // If a stage isn't in STAGES[], it gets remapped here.
  const ZOMBIE_MAP = {
    "Tepid":    "Nurture",
    "Warm":     "Hot",
    "Churned":  "Nurture",
    "Winback":  "Nurture",
    "Lost":     "Closed Lost",
    "Closed":   "Closed Lost",
    "Upcoming": "Booked"
  };
  let _renamedAny = false;
  state.ids.forEach(id => {
    const d = state.deals[id];
    if(!d) return;
    const remap = ZOMBIE_MAP[d.stage];
    if(remap){ d.stage = remap; _renamedAny = true; }
    // Catch anything else not in the valid list
    if(!STAGES.includes(d.stage)){ d.stage = "Nurture"; _renamedAny = true; }
  });
  if(_renamedAny) saveState();

  // Reset any deal that has AI saved as activeTab
  state.ids.forEach(id => {
    if(state.deals[id] && state.deals[id].activeTab === 'ai'){
      state.deals[id].activeTab = null;
    }
  });



  saveState();
}

// ── Week label ──
function getWeekLabel(){
  const d=new Date();
  const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
  const fri=new Date(d); fri.setDate(d.getDate()-d.getDay()+5);
  const o={month:"short",day:"numeric"};
  return `${mon.toLocaleDateString("en-US",o)} – ${fri.toLocaleDateString("en-US",{...o,year:"numeric"})}`;
}

// ── Parse ARR ──
function parseArr(s){ return parseFloat((s||"").replace(/[^0-9.]/g,""))||0; }
function fmtRaw(s){ const n=parseArr(s); if(!n) return ""; return Math.round(n).toLocaleString("en-US"); }
function fmtArr(s){ const n=parseArr(s); if(!n) return ""; return "$"+Math.round(n).toLocaleString("en-US"); }
function fmt(n){ return n>0?`$${Math.round(n).toLocaleString()}`:"—"; }
function pct(n,d){ return d>0?`${Math.round(n/d*100)}%`:"0%"; }

  return [...state.ids].sort((a,b)=>{
    const sa=state.deals[a]?.stage||"Nurture", sb=state.deals[b]?.stage||"Nurture";
    const ia = order.indexOf(sa) === -1 ? 99 : order.indexOf(sa);
    const ib = order.indexOf(sb) === -1 ? 99 : order.indexOf(sb);
    if(ia !== ib) return ia - ib;
    // Same stage — sort alphabetically by name
    const na=(state.deals[a]?.name||"").toLowerCase();
    const nb=(state.deals[b]?.name||"").toLowerCase();
    return na < nb ? -1 : na > nb ? 1 : 0;
  });
}

let wonMonthFilter = "";

  wonMonthFilter = val;
  renderDeals();

// Track which sections are collapsed - Won starts collapsed
const collapsedSections = new Set(["Won","Booked","Reschedule","Hot","Nurture","Passive","Closed Lost"]);

function toggleSection(stage){
  if(collapsedSections.has(stage)) collapsedSections.delete(stage);
  else collapsedSections.add(stage);
  renderDeals();
}

function renderDeals(){
  const list=document.getElementById("deals-list");
  const scrollY = window.scrollY;
  list.innerHTML="";
  let lastStage = null;
  let currentSectionCards = [];
  let currentSectionHeader = null;

  function flushSection(){
    if(!currentSectionHeader) return;
    list.appendChild(currentSectionHeader);
    const stage = currentSectionHeader.dataset.stage;
    if(!collapsedSections.has(stage)){
      currentSectionCards.forEach(c => list.appendChild(c));
    }
    currentSectionCards = [];
    currentSectionHeader = null;
  }

  sortedIds().forEach(id=>{
    const d=state.deals[id];
    if(!d) return;
    const MONTH_ORDER2 = ["July 2025","August 2025","September 2025","October 2025","November 2025","December 2025","January 2026","February 2026","March 2026","April 2026","May 2026","June 2026","July 2026","August 2026","September 2026","October 2026","November 2026","December 2026"];
    const NOW_MONTH2 = "April 2026";
    const nowIdx2 = MONTH_ORDER2.indexOf(NOW_MONTH2);
    const YTD_MONTHS2 = MONTH_ORDER2.slice(0, nowIdx2 + 1);

    // When searching, bypass month filter and show all deals globally
    if(activeSearch){
      if(!matchesSearch(d)) return;
    } else if(activeMonthFilter === "__ytd__"){
      // YTD: show all won deals closed in YTD months, show all active/open deals
    } else if(activeMonthFilter){
      // Specific month — filter by relevant date field per stage
      const alwaysCollapsed = ["Hot","Nurture","Reschedule","Booked","Passive","Closed Lost"];
      if(alwaysCollapsed.includes(d.stage)){
        // Show these but force collapsed
        if(!collapsedSections.has(d.stage)) collapsedSections.add(d.stage);
      } else {
        const dateField = (d.targetClose||"").trim();
        if(dateField && !matchesMonthFilter(dateField, activeMonthFilter)) return;
      }
    }

    // Search filter (only runs when not in search mode - search handled above)
    if(!activeSearch && !matchesSearch(d)) return;

    // Bucket dividers
    const ACTIVE_STAGES = ["Won","Open","Booked","Reschedule"];
    const PROSPECT_STAGES = ["Hot","Closed Lost","Passive","Nurture"];
    if(d.stage !== lastStage){
      // Insert bucket header before first stage in each group
      if(d.stage === "Won"){
        flushSection();
        const bh = document.createElement("div");
        bh.style.cssText = "display:flex;align-items:center;gap:12px;margin:8px 0 10px;padding:0 2px";
        bh.innerHTML = '<div style="flex:1;height:2px;background:#1B1F3B"></div><span style="font-size:13px;font-weight:700;letter-spacing:.12em;color:#1B1F3B">ACTIVE</span><div style="flex:1;height:2px;background:#1B1F3B"></div>';
        list.appendChild(bh);
      }
      if(d.stage === "Hot"){
        flushSection();
        const bh = document.createElement("div");
        bh.style.cssText = "display:flex;align-items:center;gap:12px;margin:24px 0 10px;padding:0 2px";
        bh.innerHTML = '<div style="flex:1;height:2px;background:#1B1F3B"></div><span style="font-size:13px;font-weight:700;letter-spacing:.12em;color:#1B1F3B">PROSPECTS</span><div style="flex:1;height:2px;background:#1B1F3B"></div>';
        list.appendChild(bh);
      }
      flushSection();
      lastStage = d.stage;
      const div = document.createElement("div");
      div.dataset.stage = d.stage;
      const meta = STAGE_META[d.stage]||STAGE_META["Nurture"];
      const isCollapsed = collapsedSections.has(d.stage);
      div.style.cssText = "display:flex;align-items:center;gap:10px;margin:14px 0 6px;padding:0 2px;cursor:pointer;user-select:none";

  }

}

function switchTab(id, tab){
  const d = state.deals[id];
  // Toggle: clicking the active tab closes all tabs
  const isClosing = d.activeTab === tab;
  const newTab = isClosing ? null : tab;
  // Don't persist AI tab as default
  if(newTab !== 'ai') d.activeTab = newTab;
  saveState();
  // Lazy-create history panel if it doesn't exist yet (pre-rendered cards)
  if(newTab === 'history' && !document.getElementById('tab-panel-history-'+id)){
    const container = document.getElementById('tab-container-'+id);
    if(container){
      const panel = document.createElement('div');
      panel.className = 'bottom-tab-panel active';
      panel.id = 'tab-panel-history-'+id;
      panel.dataset.theme = 'history';
      panel.style.cssText = 'padding:0 0 2px';
      panel.appendChild(buildHistory(id));
      container.appendChild(panel);
    }
  }
  // Lazy-create AI panel if it doesn't exist yet (pre-rendered cards)
  if(newTab === 'ai' && !document.getElementById('tab-panel-ai-'+id)){
    const container = document.getElementById('tab-container-'+id);
    if(container){
      const panel = document.createElement('div');
      panel.className = 'bottom-tab-panel active';
      panel.id = 'tab-panel-ai-'+id;
      panel.dataset.theme = 'ai';
      panel.style.cssText = 'padding:0 0 2px';
      panel.appendChild(buildAI(id));
      container.appendChild(panel);
    }
  }
  ['history','ai'].forEach(t => {
    const btn = document.getElementById('tab-btn-' + t + '-' + id);
    const panel = document.getElementById('tab-panel-' + t + '-' + id);
    if(btn) btn.classList.toggle('active', t===newTab);
    if(panel) panel.classList.toggle('active', t===newTab);
  });
}

      textContent.style.cssText = 'font-size:13px;color:var(--text-primary);line-height:1.55;white-space:pre-wrap;cursor:pointer;';
      textContent.title = 'Double-click to edit';
      textContent.textContent = e.text;
      textContent.ondblclick = (ev) => {

        const ta = document.createElement('textarea');
        ta.value = e.text;
        ta.style.cssText = 'width:100%;font-size:13px;font-family:inherit;padding:5px 8px;border:1.5px solid var(--border-mid);border-radius:5px;resize:vertical;line-height:1.5;color:var(--text-primary);min-height:60px;box-sizing:border-box;background:var(--surface);outline:none';
        ta.onclick = ev2 => ev2.stopPropagation();
        ta.onkeydown = ev2 => {
          if(ev2.key==='Escape'){ textContent.style.display=''; ta.replaceWith(textContent); }
          if(ev2.key==='Enter' && ev2.metaKey){ saveEdit(); }
        };
        const saveEdit = () => {
          const newText = ta.value.trim();
          if(newText && newText !== e.text){
            state.deals[id].history[i].text = newText;
            saveState();
          }
          const panel = document.getElementById('tab-panel-history-'+id);

function addHistoryEntry(id){
  const ta = document.getElementById('hist-input-'+id);
  if(!ta) return;
  const text = ta.value.trim();
  if(!text) return;
  logActivity(id, text);
  ta.value = '';
  const panel = document.getElementById('tab-panel-history-'+id);
  if(panel){ panel.innerHTML=''; panel.appendChild(buildHistory(id)); }
}

function deleteHistoryEntry(id, index){
  const d = state.deals[id];
  if(!d || !d.history) return;
  d.history.splice(index, 1);
  saveState();
  const panel = document.getElementById('tab-panel-history-'+id);
  if(panel){ panel.innerHTML=''; panel.appendChild(buildHistory(id)); }
}

async function callClaude(systemPrompt, userMessage, key){
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }]
    })
  });
  if(!resp.ok){
    const err = await resp.json().catch(()=>({error:{message:'API error'}}));
    throw new Error(err.error?.message || 'API error');
  }
  const data = await resp.json();
  return data.content.map(b => b.text || '').join('');
}

  outputEl.classList.remove('visible');
  if(spinner) spinner.style.display = 'inline-block';

  try {
    let result = '';
    const systemBase = `You are an expert B2B sales assistant helping analyze deals using the Signals framework. Score deals on six signals: Pain, Value, People, Process, Competition, Momentum. Be concise, sharp, and sales-savvy. Use the deal context provided.`;

    if(mode === 'followup'){
      outputTitle.textContent = 'Follow-Up Email';
      result = await callClaude(systemBase,
        `Write a concise, professional follow-up email for this deal. Sound like a real person, not corporate. Reference specifics from the deal context. Include a clear next step.\n\nDEAL CONTEXT:\n${ctx}`, key);

    } else if(mode === 'proposal'){

        `Write a proposal email for this deal including the products being proposed and the business case. Reference their specific pain points and desired outcomes. Mention ARR pricing context if available.\n\nDEAL CONTEXT:\n${ctx}`, key);

    } else if(mode === 'signals'){
      outputTitle.textContent = 'Signals Analysis';
      result = await callClaude(systemBase,
        `Analyze this deal using the 4-Signal framework. For each signal (The Pain, The Edge, The People, The Process), assess the evidence quality (Rep Assertion, Prospect Quote, Quantified Consequence, or Dollar Impact), explain what we know, what's missing, and what the rep should do next to strengthen that signal.\n\nDEAL CONTEXT:\n${ctx}`, key);

function completeNextStep(id){
  const d = state.deals[id];
  if(!d || !d.nextStep || !d.nextStep.trim()) return;
  if(!d.timeline) d.timeline = [];
  const now = new Date();
  const todayFmt = (now.getMonth()+1)+'/'+now.getDate()+'/'+now.getFullYear();
  let rawDate = d.nextStepDate || '';
  let ts = todayFmt;
  if(rawDate){
    // Convert YYYY-MM-DD to M/D/YYYY
    const parts = rawDate.split('-');
    if(parts.length === 3) ts = parseInt(parts[1])+'/'+parseInt(parts[2])+'/'+parts[0];
    else ts = rawDate;
  }
  d.timeline.push({ts: ts, text: d.nextStep.trim(), type:'completed'});
  d.nextStep = '';
  d.nextStepDate = '';
  saveState();
  refreshCard(id);
}

function addTimelineEntry(id){
  const dateEl = document.getElementById('tl-date-'+id);
  const textEl = document.getElementById('tl-text-'+id);
  if(!textEl) return;
  const text = textEl.value.trim();
  if(!text) return;
  const d = state.deals[id];
  if(!d.timeline) d.timeline = [];
  const dateVal = dateEl ? dateEl.value : '';
  const now = new Date();
  const ts = dateVal || ((now.getMonth()+1)+'/'+now.getDate()+'/'+now.getFullYear());
  d.timeline.push({ts: ts, text: text, type:'completed'});
  saveState();
  refreshCard(id);
}

function editHistoryEntry(event, id, index){
  event.stopPropagation();
  const div = document.getElementById('hist-text-'+id+'-'+index);
  if(!div || div.querySelector('textarea')) return;
  const current = div.textContent;
  const ta = document.createElement('textarea');
  ta.value = current;
  ta.style.cssText = 'width:100%;font-size:13px;font-family:inherit;color:#374151;line-height:1.5;border:1px solid #EF9F27;border-radius:4px;padding:4px 6px;resize:vertical;box-sizing:border-box;outline:none;min-height:48px';
  ta.onclick = e => e.stopPropagation();
  let saved = false;
  const save = () => {
    if(saved) return;
    saved = true;
    const newText = ta.value.trim();
    const d = state.deals[id];
    const completed = (d.timeline||[]).filter(e => e.type==='completed');
    const entry = completed[index];
    if(entry && newText !== current){
      entry.text = newText;
      saveState();
    }
    refreshCard(id);
  };
  ta.addEventListener('blur', save);
  ta.addEventListener('keydown', e => {
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); e.stopPropagation(); save(); }
    if(e.key==='Escape'){ saved=true; e.stopPropagation(); refreshCard(id); }
  });
  div.innerHTML = '';
  div.appendChild(ta);
  ta.focus();
}

function deleteTimelineEntry(id, index){
  const d = state.deals[id];
  if(!d || !d.timeline) return;
  const completed = d.timeline.filter(e => e.type === 'completed');
  if(index < 0 || index >= completed.length) return;
  const actualIndex = d.timeline.indexOf(completed[index]);
  if(actualIndex >= 0) d.timeline.splice(actualIndex, 1);
  saveState();
  refreshCard(id);
}

// ── Structured Contacts ───────────────────────────────────────────────
function migrateContacts(d){
  if(d.contactsList && d.contactsList.length) return;
  d.contactsList = [];
  if(d.contacts && d.contacts.trim()){
    d.contacts.split(/[,\n]+/).forEach(c => {
      c = c.trim();
      if(!c) return;
      const dash = c.indexOf(' - ');
      if(dash > 0){
        d.contactsList.push({name: c.substring(0, dash).trim(), title: c.substring(dash+3).trim(), notes: ''});
      } else {
        d.contactsList.push({name: c, title: '', notes: ''});
      }
    });
  }
}

function addContact(id){
  const d = state.deals[id];
  if(!d.contactsList) d.contactsList = [];
  d.contactsList.push({name:'', title:'', notes:''});
  saveState();
  refreshCard(id);
}

function removeContact(id, index){
  const d = state.deals[id];
  if(!d || !d.contactsList) return;
  d.contactsList.splice(index, 1);
  saveState();
  refreshCard(id);
}

function updContact(id, index, field, value){
  const d = state.deals[id];
  if(!d || !d.contactsList || !d.contactsList[index]) return;
  d.contactsList[index][field] = value;
  // Also update legacy contacts string for CSV export
  d.contacts = d.contactsList.map(c => c.name + (c.title ? ' - ' + c.title : '')).join(', ');
  saveState();
}

function updContactAuto(id, index, field, value){
  const d = state.deals[id];
  if(!d) return;
  if(!d.contactsList) d.contactsList = [];
  // Ensure the index exists
  while(d.contactsList.length <= index) d.contactsList.push({name:'', title:'', notes:''});
  d.contactsList[index][field] = value;
  d.contacts = d.contactsList.filter(c=>c.name||c.title).map(c => c.name + (c.title ? ' - ' + c.title : '')).join(', ');
  saveState();
  // If typing in the last contact, add a new blank and refresh
  const isLast = index === d.contactsList.length - 1;
  const hasContent = d.contactsList[index].name || d.contactsList[index].title;
  if(isLast && hasContent){
    d.contactsList.push({name:'', title:'', notes:''});
    saveState();
    refreshCard(id);
  }
}

function refreshCard(id){
  const card = document.getElementById('card-'+id);
  if(!card) return;
  const wasOpen = card.classList.contains('open');
  const parent = card.parentNode;
  const next = card.nextSibling;
  const newCard = makeCard(id);
  parent.replaceChild(newCard, card);
  if(wasOpen) toggleCard(id);
}

                return `<div class="prod-opt${sel?' selected':''}" onclick="toggleProd('${id}','${p}')" id="prodopt-${id}-${p.replace(/[^a-z0-9]/gi,'_')}">${sel?'&#10003; ':'  '}${p}</div>`;
              }).join('')}

          </div>

            </div>

  const savedOrder = state.deals[id].sectionOrder;

  const validKeys = SECTIONS.map(s=>s.key);
  const needsReset = savedOrder && savedOrder.some(k=>!validKeys.includes(k));
  const orderedSections = (savedOrder && !needsReset)
    ? savedOrder.map(k=>SECTIONS.find(s=>s.key===k)).filter(Boolean)
    : SECTIONS;
  if(needsReset) upd(id,"sectionOrder",null);

  const wrapper = document.createElement("div");
  wrapper.style.cssText = "position:relative";

  orderedSections.forEach((sec,i)=>{
    const div = document.createElement("div");
    div.className = "drag-section";
    div.dataset.secKey = sec.key;
    div.style.marginBottom = "26px";
    div.innerHTML = `` + sec.html;
    div.addEventListener("dragstart", e=>{
      e.dataTransfer.effectAllowed="move";
      e.dataTransfer.setData("text/plain", sec.key);
      div.classList.add("dragging");
    });
    div.addEventListener("dragend", ()=>{
      div.classList.remove("dragging");
      wrapper.querySelectorAll(".drag-section").forEach(d=>d.classList.remove("drag-over"));
      // Save new order
      const newOrder = [...wrapper.querySelectorAll(".drag-section")].map(d=>d.dataset.secKey);
      upd(id,"sectionOrder",newOrder);
    });
    div.addEventListener("dragover", e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect="move";
      wrapper.querySelectorAll(".drag-section").forEach(d=>d.classList.remove("drag-over"));
      div.classList.add("drag-over");
    });
    div.addEventListener("drop", e=>{
      e.preventDefault();
      const fromKey = e.dataTransfer.getData("text/plain");
      const fromEl = wrapper.querySelector(`[data-sec-key="${fromKey}"]`);
      if(fromEl && fromEl !== div){
        const allSecs = [...wrapper.querySelectorAll(".drag-section")];
        const fromIdx = allSecs.indexOf(fromEl);
        const toIdx = allSecs.indexOf(div);
        if(fromIdx < toIdx) wrapper.insertBefore(fromEl, div.nextSibling);
        else wrapper.insertBefore(fromEl, div);
      }
      div.classList.remove("drag-over");
    });
    wrapper.appendChild(div);
  });

  const delRow = document.createElement("div");
  delRow.style.cssText = "display:flex;justify-content:flex-end;margin-top:4px";
  delRow.innerHTML = `<button class="del-btn" onclick="deleteAccount('${id}')">Remove account</button>`;
  wrapper.appendChild(delRow);

  body.appendChild(wrapper);

  // Tabbed bottom panel
  body.appendChild(buildTabContainer(id));

  // Won — stage is locked
  if(d.stage === "Won"){
    // Lock just the stage dropdown after render
    setTimeout(()=>{
      const stageSel = body.querySelector('select[onchange*="stage"]');
      if(stageSel){ stageSel.disabled = true; stageSel.style.opacity = "0.5"; stageSel.style.cursor = "not-allowed"; }
    }, 0);
  }

  card.appendChild(body);
  return card;
}




function makeOtherField(id, field, opts, val, placeholder){

  if(isOtherMode){
    const dashBorder = displayVal ? 'border:1px solid var(--border-mid)' : 'border:1.5px dashed #9ca3af';
    return `<div id="${field}-wrap-${id}" style="position:relative">
      <input type="text" value="${esc(displayVal)}" oninput="event.stopPropagation();upd('${id}','${field}',this.value||'__other__')" onclick="event.stopPropagation()" placeholder="${placeholder}" style="width:100%;padding:8px 28px 8px 10px;border-radius:var(--r-sm);${dashBorder};font-size:var(--text-base);color:${displayVal?'var(--text-primary)':'#9ca3af'};font-family:inherit;box-sizing:border-box" id="${field}-input-${id}">

    <select class="${dash}" onchange="handleOtherSwap('${id}','${field}',this.value)" style="width:100%;${clr}">

      ${opts.map(s=>`<option value="${s}"${val===s?' selected':''} style="color:var(--text-primary)">${s}</option>`).join('')}
      <option value="Other" style="color:var(--text-primary)">Other</option>

}

function handleOtherSwap(id, field, val){
  if(val === 'Other'){
    upd(id, field, '__other__');
    refreshCard(id);
    setTimeout(()=>{
      const inp = document.getElementById(field+'-input-'+id);
      if(inp) inp.focus();
    }, 50);
  } else {
    upd(id, field, val);
    const sel = document.querySelector('#'+field+'-wrap-'+id+' select');
    if(sel){ sel.style.color = val ? '' : '#9ca3af'; sel.className = val ? '' : 'sel-dashed'; }
  }
}

function clearOtherField(id, field){
  upd(id, field, '');
  refreshCard(id);
}

function handlePhoto2(id, input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const SIZE = 200;
      const canvas = document.createElement('canvas');
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(SIZE/img.width, SIZE/img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (SIZE-w)/2, (SIZE-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      upd(id, 'photo2', dataUrl);
      const wrap = document.getElementById('photo-wrap2-'+id);
      if(wrap) wrap.innerHTML = makePhotoBox2(id, dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handlePhoto(id, input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Compress to 80x80 thumbnail
      const SIZE = 200;
      const canvas = document.createElement('canvas');
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      // Cover crop: center the image
      const scale = Math.max(SIZE/img.width, SIZE/img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (SIZE-w)/2, (SIZE-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      upd(id, 'photo', dataUrl);
      savePhoto(id, dataUrl);
      const wrap = document.getElementById('photo-wrap-'+id);
      if(wrap) wrap.innerHTML = makePhotoBox(id, dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function makeCB(id, field, checked, label, colorClass){
  const isChecklist=field.startsWith("cl_");
  const clKey=isChecklist?field.slice(3):null;
  const handler=isChecklist
    ?`updCL('${id}','${clKey}',!state.deals['${id}'].checklist?.['${clKey}'])`
    :`upd('${id}','${field}',!state.deals['${id}']['${field}'])`;
  const cc = colorClass || '';
  const lc = colorClass ? colorClass.replace('cb-','cbl-') : '';
  return `<div class="cb-wrap" onclick="${handler}">
    <div class="cb-box${checked?" checked":""}${cc?' '+cc:''}" id="cb-${id}-${field}">
      ${checked?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
    </div>
    <span class="cb-label${checked?" checked":""}${lc?' '+lc:''}" id="cbl-${id}-${field}">${label}</span>
  </div>`;
}

function unlockDeal(id){
  state.deals[id].stage = 'Open';
  state.deals[id].closedLost = null;
  saveState();
  // Clear month filter so the newly-unlocked card is visible regardless of targetClose
  activeMonthFilter = '';
  const sel = document.getElementById('month-filter');
  if(sel) sel.value = '';
  renderDeals();
  // Find card, open it, scroll to it
  const newCard = document.querySelector('[data-id="'+id+'"]');
  if(newCard){
    newCard.classList.add('open');
    const chevron = newCard.querySelector('.chevron');
    if(chevron) chevron.textContent = '▲';
    setTimeout(()=>newCard.scrollIntoView({behavior:'smooth', block:'center'}), 50);
  }
}

function upd(id, field, val){
  state.deals[id][field]=val;
  // Auto-log key changes to History
  if(field==='stage' && val) logActivity(id, `Stage → ${val}`, true);
  if(field==='nextStep' && val) logActivity(id, `Next Step updated: ${val}`, true);
  // When stage changes to Won, sync forecast+bucket; clear targetClose for non-Open/Won
  if(field==="stage"){
    if(val==="Won"){ state.deals[id].bucket="Won"; state.deals[id].forecast="Won"; }
    if(val!=="Open" && val!=="Won") state.deals[id].targetClose="";
    saveState(); updateHeader(); renderDeals(); return;
  }
  // When forecast changes to Won, sync stage+bucket and move card
  if(field==="forecast" && val==="Won"){
    state.deals[id].stage="Won"; state.deals[id].bucket="Won";
    logActivity(id, `Stage → Won`, true);
    saveState(); updateHeader(); renderDeals(); return;
  }
  // Auto-calculate timezone from state
  if(field==="state"){
    const auto = tzFromState(val);
    if(auto){
      state.deals[id].tz = auto;
      const tzSel = document.querySelector(`[data-id="${id}"] select[data-field="tz"]`);
      if(tzSel) tzSel.value = auto;
    }
  }
  saveState();
  updateHeader();
  // Full re-render when stage changes (to move card between sections)
  if(field==="stage" || (field==="forecast" && val==="Won")){
    renderDeals();
    return;
  }
  // Live-update subtitle when erp, cam, state, tz, or targetClose changes
  if(field==="erp" || field==="cam" || field==="state" || field==="tz"){
    const sub = document.getElementById("card-sub-"+id);
    if(sub){
      const d = state.deals[id];
      let html = "";
      if(cleanVal(d.erp)) html += `<span style="color:#4b5563">${cleanVal(d.erp)}</span>`;
      if(cleanVal(d.cam)) html += `<span>${cleanVal(d.cam)}</span>`;
      sub.innerHTML = html;
    }
    return;
  }
  // Live-update the card header month label when targetClose changes
  if(field==="targetClose"){
    const d=state.deals[id];
    const isClosed=d.stage==="Won";
    const hdrSpan=document.querySelector(`[data-id="${id}"] .card-header-month`);
    if(hdrSpan){
      if(isClosed){
        hdrSpan.textContent=(d.stage==="Won"?"WON":"CLOSED")+(val?" "+val:"");
      } else {
        hdrSpan.textContent=val||"No close month";
        hdrSpan.style.color=val?"#6b7280":"#d1d5db";
      }
    }
    return;
  }
  // Update checkbox DOM for boolean fields
  if(field==="pricingSent"){
    const box=document.getElementById(`cb-${id}-pricingSent`);
    const lbl=document.getElementById(`cbl-${id}-pricingSent`);
    if(box){
      box.className="cb-box"+(val?" checked":"");
      box.innerHTML=val?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:"";
    }
    if(lbl){ lbl.className="cb-label"+(val?" checked":""); }
    return;
  }
}

function updCL(id, key, val){
  if(!state.deals[id].checklist) state.deals[id].checklist={};
  state.deals[id].checklist[key]=val;
  // Auto-advance to Open when 1st call is checked on pre-open stages
  const autoOpenStages = ["Booked","Reschedule","Hot","Nurture","Passive","Closed Lost"];
  if(key==="call1" && val && autoOpenStages.includes(state.deals[id].stage)){
    state.deals[id].stage = "Open";
    saveState();
    refreshCard(id);
    return;
  }
  saveState();
  // Update checkbox UI
  const box=document.getElementById(`cb-${id}-cl_${key}`);
  const lbl=document.getElementById(`cbl-${id}-cl_${key}`);
  if(box){
    const isAmber = key.startsWith('call') || key.startsWith('fu');
    box.className="cb-box"+(val?" checked":"")+(isAmber?" cb-amber":"");
    box.innerHTML=val?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:"";
  }
  if(lbl){ lbl.className="cb-label"+(val?" checked":"")+(isAmber?" cbl-amber":""); }
  // Update progress bar
  const done=CHECKLIST.filter(c=>state.deals[id].checklist?.[c.id]).length;
  const p=Math.round(done/CHECKLIST.length*100);
  const prog=document.getElementById("prog-"+id);
  if(prog) prog.style.width=p+"%";
  const sdiv=prog?.closest(".section-div")?.querySelector("span");
  if(sdiv) sdiv.textContent=`Close Checklist - ${p}%`;
  refreshCardHeader(id);
}

function refreshCardHeader(id){
  // Update just the subtitle text (erp, cam, close month) without replacing card
  const d = state.deals[id];
  if(!d) return;
  const sub = document.getElementById("card-sub-"+id);
  if(sub){
    const parts = [d.erp, d.cam];
    if(d.stage === "Won" && d.targetClose) parts.push("Won " + d.targetClose);
    else if(d.stage === "Open" && d.targetClose) parts.push(d.targetClose);
    sub.textContent = parts.filter(Boolean).join("   ");
  }
  const nameEl = document.getElementById("card-name-"+id);
  if(nameEl) nameEl.textContent = d.name || "Unnamed";
  updateHeader();
}

function toggleCard(id){
  const card = document.querySelector('[data-id="'+id+'"]');
  if(!card) return;
  const isOpen = card.classList.contains('open');
  
  // Remember scroll position and card's position on screen
  const cardRect = card.getBoundingClientRect();
  const cardTopBefore = cardRect.top;
  
  // Close all other open cards first — clear their tints and reset tabs
  document.querySelectorAll('.card.open').forEach(c => {
    if(c.dataset.id !== id){
      c.classList.remove('open');
      const b = c.querySelector('.card-body');
      if(b) b.style.display = 'none';
      const ch = c.querySelector('.chevron');
      if(ch) ch.textContent = '▼';
      c.style.background = '';
      const ch2 = c.querySelector('.card-header');
      if(ch2) ch2.style.background = '';
      c.style.borderLeftColor = c.dataset.borderColor || '';
      // Reset tabs to closed — state AND DOM
      if(state.deals[c.dataset.id]) state.deals[c.dataset.id].activeTab = null;
      c.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
      c.querySelectorAll('.bottom-tab-panel').forEach(p => p.classList.remove('active'));
    }
  });
  
  // Restore scroll so clicked card stays in the same screen position
  const cardTopAfter = card.getBoundingClientRect().top;
  if(cardTopAfter !== cardTopBefore){
    window.scrollBy(0, cardTopAfter - cardTopBefore);
  }
  
  card.classList.toggle('open', !isOpen);
  const body = card.querySelector('.card-body');
  if(body) body.style.display = isOpen ? 'none' : 'block';
  const chevron = card.querySelector('.chevron');
  if(chevron) chevron.textContent = isOpen ? '▼' : '▲';
  // Tint header when open, clear when closed
  const hdrEl = card.querySelector('.card-header');
  if(hdrEl) hdrEl.style.background = isOpen ? '' : (card.dataset.cardBg || '');
  card.style.borderLeftColor = isOpen ? (card.dataset.borderColor || '') : 'transparent';
  // If closing this card, reset its tabs — state AND DOM
  if(isOpen){
    if(state.deals[id]) state.deals[id].activeTab = null;
    card.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
    card.querySelectorAll('.bottom-tab-panel').forEach(p => p.classList.remove('active'));
  }
}

  state.ids=state.ids.filter(i=>i!==id);

  saveState();
  renderDeals();
}

async function importJSON(input){
  const file = input.files[0];
  if(!file) return;
  const statusEl = document.getElementById("save-status");
  try{
    const text = await file.text();
    const loaded = JSON.parse(text);
    if(!loaded.ids || !loaded.deals){ alert("Invalid backup file - missing ids or deals."); return; }
    state = loaded;
    renderDeals();
    // Save IMMEDIATELY to server file — no debounce
    const slim = JSON.parse(JSON.stringify(state));
    Object.keys(slim.deals).forEach(id=>{ delete slim.deals[id].photo; });
    await idbSet(SK, slim);
    _unsavedChanges = false;
    if(statusEl){ statusEl.textContent="● Backup loaded & saved!"; statusEl.style.color="#178a65"; setTimeout(()=>{ statusEl.textContent="● Saved"; },4000); }
  }catch(err){
    alert("Could not read backup file: "+err.message);
    if(statusEl){ statusEl.textContent="● Load failed!"; statusEl.style.color="#ef4444"; }
  }
  input.value = "";
}

function updArr(id, raw, from){
  const digits = raw.replace(/[^0-9]/g,'');
  upd(id,'arr',digits);
  const formatted = digits ? parseInt(digits,10).toLocaleString('en-US') : '';
  const top = document.getElementById('arr-top-'+id);
  const bot = document.getElementById('arr-bot-'+id);
  const el = from==='top' ? top : bot;
  if(el){
    const pos = el.selectionStart;
    const oldLen = el.value.length;
    el.value = formatted;
    const newLen = el.value.length;
    const newPos = Math.max(0, pos + (newLen - oldLen));
    el.setSelectionRange(newPos, newPos);
  }
  if(from==='top' && bot) bot.value = formatted;
  if(from==='bot' && top) top.value = formatted;
}

  // Convert YYYY-MM-DD to M/D/YY
  let stored = val;
  if(val && val.includes('-')){
    const parts = val.split('-');
    stored = `${parseInt(parts[1])}/${parseInt(parts[2])}/${parts[0].slice(2)}`;
  }
  state.deals[id].cldate[key] = stored;
  // Auto-advance to Open when 1st call date is set on pre-open stages
  const autoOpenStages = ["Booked","Reschedule","Hot","Nurture","Passive","Closed Lost"];
  if(key==="call1" && stored && autoOpenStages.includes(state.deals[id].stage)){
    state.deals[id].stage = "Open";
  }
  saveState();
  refreshCard(id);
}

function populateDateDropdowns(){
  // Build date list: 90 days back through 180 days forward
  const opts=[];
  const today=new Date();
  for(let d=-90;d<=180;d++){
    const dt=new Date(today);
    dt.setDate(today.getDate()+d);
    const m=dt.getMonth()+1;
    const day=dt.getDate();
    const y=dt.getFullYear();
    opts.push(`${m}/${day}/${y}`);
  }
  document.querySelectorAll('select.cl-date-sel').forEach(sel=>{
    const saved=sel.value;
    // Preserve placeholder
    sel.innerHTML='<option value="">date</option>';
    opts.forEach(v=>{
      const o=document.createElement('option');
      o.value=v; o.textContent=v;
      if(v===saved) o.selected=true;
      sel.appendChild(o);
    });
    // Restore saved value even if outside range
    if(saved && saved!==sel.value){
      const o=document.createElement('option');
      o.value=saved; o.textContent=saved; o.selected=true;
      sel.appendChild(o);
      sel.value=saved;
    }
  });
}

// ── Data import/export dropdowns ──
function toggleDataDD(which) {
  const importDD = document.getElementById('import-dd');
  const exportDD = document.getElementById('export-dd');
  if(which === 'import') {
    const show = importDD.style.display === 'none';
    importDD.style.display = show ? 'block' : 'none';
    exportDD.style.display = 'none';
  } else {
    const show = exportDD.style.display === 'none';
    exportDD.style.display = show ? 'block' : 'none';
    importDD.style.display = 'none';
  }
}
document.addEventListener('click', e => {
  if(!e.target.closest('#import-dd') && !e.target.closest('[onclick*="toggleDataDD"]'))
    document.getElementById('import-dd').style.display = 'none';
  if(!e.target.closest('#export-dd') && !e.target.closest('[onclick*="toggleDataDD"]'))
    document.getElementById('export-dd').style.display = 'none';
});

// ── Alert system ──
let isNoon = true;
function toggleTheme(){
  isNoon = !isNoon;
  const track = document.getElementById('theme-toggle');
  const dot = document.getElementById('theme-toggle-dot');
  if(isNoon){
    track.style.background = '#e2e6ea';
    dot.style.background = '#BDB8E9';
    dot.style.right = 'auto';
    dot.style.left = '2px';
  } else {
    track.style.background = '#3d4470';
    dot.style.background = '#AFA9EC';
    dot.style.left = 'auto';
    dot.style.right = '2px';
  }
}

function toggleSearchBar(){
  const row = document.getElementById('search-bar-row');
  if(!row) return;
  const isVisible = row.style.display !== 'none';
  row.style.display = isVisible ? 'none' : 'block';
  if(!isVisible){
    const input = document.getElementById('search-input');
    if(input) input.focus();
  }
}

function togglePeriodDD(){
  const dd = document.getElementById('period-dd');
  const ch = document.getElementById('period-chev');
  if(!dd) return;
  const isOpen = dd.style.display !== 'none';
  dd.style.display = isOpen ? 'none' : 'block';
  if(ch) ch.style.transform = isOpen ? '' : 'rotate(180deg)';
  if(!isOpen) populatePeriodDD();
}

function populatePeriodDD(){
  const dd = document.getElementById('period-dd');
  if(!dd) return;
  const sel = document.getElementById('month-filter');
  const opts = sel ? Array.from(sel.options) : [];
  dd.innerHTML = opts.map(o => {
    const active = o.value === activeMonthFilter;
    return '<div onclick="selectPeriod(\''+o.value+'\')" style="padding:10px 14px;font-size:12px;font-weight:'+(active?'700':'500')+';color:'+(active?'#fff':'#9999BB')+';cursor:pointer;border-bottom:1px solid #2e3358;" onmouseenter="this.style.background=\'rgba(255,255,255,0.04)\'" onmouseleave="this.style.background=\'\'">'+o.text+'</div>';
  }).join('');
}

function selectPeriod(val){
  const sel = document.getElementById('month-filter');
  if(sel) sel.value = val;
  const label = document.getElementById('period-label');
  const opt = sel ? Array.from(sel.options).find(o=>o.value===val) : null;
  if(label) label.textContent = opt ? opt.text : 'Full year';
  document.getElementById('period-dd').style.display = 'none';
  document.getElementById('period-chev').style.transform = '';
  filterByMonth();
}

function toggleAlert(id) {
  var dd = document.getElementById('dd_' + id);
  var ch = document.getElementById('chev_' + id);
  if(!dd || !ch) return;
  var isOpen = dd.classList.contains('open');
  document.querySelectorAll('.alert-dd').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.chev').forEach(function(el) { el.style.transform = ''; });
  if (!isOpen) {
    dd.classList.add('open');
    ch.style.transform = 'rotate(180deg)';
  }
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.alert-wrap')) {
    document.querySelectorAll('.alert-dd').forEach(function(el) { el.classList.remove('open'); });
    document.querySelectorAll('.chev').forEach(function(el) { el.style.transform = ''; });
  }
  if (!e.target.closest('#period-wrap')) {
    const dd = document.getElementById('period-dd');
    const ch = document.getElementById('period-chev');
    if(dd) dd.style.display = 'none';
    if(ch) ch.style.transform = '';
  }
});

function updateAlerts(){
  const alerts = [];
  const colorMap = { pink:"#D4537E", amber:"#EF9F27", purple:"#AFA9EC", teal:"#1D9E75" };
  state.ids.forEach(id => {
    const d = state.deals[id];
    if(!d || d.stage === "Won" || d.stage === "Closed Lost") return;
    // No next step defined
    if(d.stage === "Open" && !d.nextStep){
      alerts.push({ name: d.name, note: "No next step defined.", color: colorMap.pink });
    }
    // Missing ARR on Open deals
    if(d.stage === "Open" && !d.arr){
      alerts.push({ name: d.name, note: "ARR not set on open deal.", color: colorMap.amber });
    }
    // Missing close month on Open deals
    if(d.stage === "Open" && !d.targetClose){
      alerts.push({ name: d.name, note: "No close month set.", color: colorMap.purple });
    }
  });
  // Cap at 5 alerts
  const shown = alerts.slice(0, 5);
  const countLabel = document.getElementById('alert-count-label');
  if(countLabel) countLabel.textContent = shown.length + " ALERT" + (shown.length !== 1 ? "S" : "");
  const dd = document.getElementById('dd_main');
  if(!dd) return;
  if(shown.length === 0){
    dd.innerHTML = '<div class="alert-item alert-item-dark"><div class="alert-text"><div class="alert-title" style="color:#9999BB;">No alerts right now</div></div></div>';
    return;
  }
  dd.innerHTML = shown.map(a =>
    `<div class="alert-item alert-item-dark">
      <div class="alert-dot" style="background:${a.color};"></div>
      <div class="alert-text">
        <div class="alert-title">${a.name}</div>
        <div class="alert-sub">${a.note}</div>
      </div>
    </div>`
  ).join('');
}
